spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;NON_KEYWORDS=PRIMARY,VALUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  flyway:
    enabled: true
    # Use test-specific migrations directory to avoid duplicate version conflict
    locations: classpath:db/migration-test
    baseline-on-migrate: true
    validate-on-migrate: false

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 15

  ai:
    deepseek:
      base-url: https://api.deepseek.com
      api-key: test-key
      chat:
        options:
          model: deepseek-chat
          temperature: 0.3

logging:
  level:
    com.youhua: DEBUG
    org.flywaydb: DEBUG
