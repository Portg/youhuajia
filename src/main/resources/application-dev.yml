spring:
  # DataSource
  datasource:
    url: jdbc:mysql://localhost:3306/youhuajia_dev?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # Spring AI - DeepSeek
  ai:
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:sk-44e4a798d07249b1a725bc709c1d15e4}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.3

youhua:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000,http://localhost:3001,http://localhost:8080

# Logging
logging:
  level:
    com.youhua: DEBUG
    org.springframework.web: INFO
    com.baomidou.mybatisplus: DEBUG
