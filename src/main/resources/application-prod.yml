spring:
  # DataSource
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DB:youhuajia}?useUnicode=true&characterEncoding=UTF-8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 4

  # Spring AI - DeepSeek
  ai:
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL}
      api-key: ${DEEPSEEK_API_KEY}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.3

  # Flyway
  flyway:
    enabled: true

youhua:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://youhuajia.com}

management:
  endpoint:
    health:
      show-details: never

# Logging
logging:
  level:
    com.youhua: INFO
    org.springframework.web: WARN
