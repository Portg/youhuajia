strategy_name: "稳健策略"
segment: DEFAULT
description: "适用于大多数用户，均衡考虑各维度风险"
created_by: "系统"
created_at: "2026-03-01"
version: "1.0"

risk_level_boundaries: [80, 60, 40]
restructure_threshold: 60

reason_code_messages:
  DIR:
    label: "负债收入比"
    explain_template: "当前负债收入比 {value}，{level_desc}"
    level_descriptions:
      - { max: 0.30, desc: "财务状况健康" }
      - { max: 0.50, desc: "有一定压力但可控" }
      - { max: 0.70, desc: "建议控制新增借贷" }
      - { max: 0.90, desc: "偿债压力较大，需要优化" }
      - { max: 999, desc: "建议优先降低负债" }
    improvement_tip: "减少月供或增加收入可提升此项得分"
  APR:
    label: "综合利率"
    explain_template: "当前加权利率 {value}%，{level_desc}"
    level_descriptions:
      - { max: 10, desc: "利率水平优秀" }
      - { max: 18, desc: "利率水平正常" }
      - { max: 24, desc: "利率偏高，有优化空间" }
      - { max: 36, desc: "利率较高，建议优化" }
      - { max: 999, desc: "利率过高，强烈建议置换" }
    improvement_tip: "优先偿还高利率负债，或申请更低利率贷款置换"
  LIQ:
    label: "流动性"
    explain_template: "月收入与月供关系：{level_desc}"
    level_descriptions:
      - { max: 0, desc: "月供超过月收入，流动性紧张" }
      - { max: 999, desc: "月收入覆盖月供，流动性正常" }
    improvement_tip: "确保月收入大于月供总额"
  OVD:
    label: "逾期情况"
    explain_template: "逾期 {value} 笔，{level_desc}"
    level_descriptions:
      - { max: 0, desc: "无逾期记录，信用良好" }
      - { max: 1, desc: "有少量逾期，注意及时处理" }
      - { max: 3, desc: "逾期笔数较多，影响信用评估" }
      - { max: 999, desc: "逾期较严重，建议优先处理" }
    improvement_tip: "尽快处理逾期债务，避免逾期天数增长"
  CST:
    label: "信用稳定度"
    explain_template: "负债 {value} 笔，{level_desc}"
    level_descriptions:
      - { max: 2, desc: "负债笔数少，信用稳定" }
      - { max: 4, desc: "负债笔数适中" }
      - { max: 6, desc: "负债笔数较多，建议整合" }
      - { max: 999, desc: "负债笔数过多，建议减少" }
    improvement_tip: "避免短期内新增多笔借贷"
