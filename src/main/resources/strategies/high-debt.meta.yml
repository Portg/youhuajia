strategy_name: "高负债优化策略"
segment: HIGH_DEBT
description: "针对高负债用户（负债收入比>0.70或负债≥5笔），侧重负债收入比改善，门槛放宽鼓励行动"
created_by: "系统"
created_at: "2026-03-01"
version: "1.0"

risk_level_boundaries: [75, 55, 35]
restructure_threshold: 55

reason_code_messages:
  DIR:
    label: "负债收入比"
    explain_template: "当前负债收入比 {value}，{level_desc}"
    level_descriptions:
      - { max: 0.30, desc: "财务状况健康" }
      - { max: 0.50, desc: "有一定压力但可控" }
      - { max: 0.70, desc: "压力较大，建议优先降低月供" }
      - { max: 0.90, desc: "偿债压力很大，需要制定还款计划" }
      - { max: 1.20, desc: "月供已超过合理范围，建议与债权方协商" }
      - { max: 999, desc: "建议立即制定债务重组方案" }
    improvement_tip: "优先还清小额债务减少月供笔数，或与高额债务债权方协商延期"
  APR:
    label: "综合利率"
    explain_template: "当前加权利率 {value}%，{level_desc}"
    level_descriptions:
      - { max: 10, desc: "利率水平优秀" }
      - { max: 18, desc: "利率水平正常" }
      - { max: 24, desc: "利率偏高，有优化空间" }
      - { max: 36, desc: "利率较高，建议优化" }
      - { max: 999, desc: "利率过高，强烈建议置换" }
    improvement_tip: "优先偿还高利率小额贷款，用低息贷款置换高息负债"
  LIQ:
    label: "流动性"
    explain_template: "月收入与月供关系：{level_desc}"
    level_descriptions:
      - { max: 0, desc: "月供超过月收入，流动性紧张" }
      - { max: 999, desc: "月收入覆盖月供，流动性正常" }
    improvement_tip: "确保月收入大于月供总额，必要时与债权方协商降低月供"
  OVD:
    label: "逾期情况"
    explain_template: "逾期 {value} 笔，{level_desc}"
    level_descriptions:
      - { max: 0, desc: "无逾期记录，信用良好" }
      - { max: 1, desc: "有少量逾期，注意及时处理" }
      - { max: 3, desc: "逾期笔数较多，影响信用评估" }
      - { max: 999, desc: "逾期较严重，建议优先处理" }
    improvement_tip: "优先处理逾期金额最大的债务，避免逾期天数继续增长"
  CST:
    label: "信用稳定度"
    explain_template: "负债 {value} 笔，{level_desc}"
    level_descriptions:
      - { max: 2, desc: "负债笔数少，信用稳定" }
      - { max: 4, desc: "负债笔数适中" }
      - { max: 6, desc: "负债笔数较多，建议整合" }
      - { max: 999, desc: "负债笔数过多，建议尽快整合" }
    improvement_tip: "通过整合多笔小额债务为一笔来简化还款管理"
